# CHINJU Protocol - Test Configuration
#
# Usage:
#   # Run TPM integration tests
#   docker-compose -f docker-compose.yml -f docker-compose.test.yml up --build chinju-tpm-test
#
#   # Interactive shell for debugging
#   docker-compose -f docker-compose.yml -f docker-compose.test.yml run --rm chinju-tpm-shell

version: '3.8'

services:
  # ==========================================================================
  # TPM Integration Test Runner
  # ==========================================================================
  chinju-tpm-test:
    build:
      context: .
      dockerfile: chinju-core/Dockerfile.test
    container_name: chinju-tpm-test
    environment:
      - RUST_LOG=debug
      - RUST_BACKTRACE=1
      # TPM connection to swtpm service
      - TPM_INTERFACE=socket
      - TPM_HOST=swtpm
      - TPM_PORT=2321
    depends_on:
      swtpm:
        condition: service_healthy
    networks:
      - chinju-network
    # Run tests
    command: cargo test --features tpm -p chinju-core -- --ignored --test-threads=1 --nocapture

  # ==========================================================================
  # Interactive Shell for Debugging
  # ==========================================================================
  chinju-tpm-shell:
    build:
      context: .
      dockerfile: chinju-core/Dockerfile.test
    container_name: chinju-tpm-shell
    environment:
      - RUST_LOG=debug
      - TPM_INTERFACE=socket
      - TPM_HOST=swtpm
      - TPM_PORT=2321
    depends_on:
      swtpm:
        condition: service_healthy
    networks:
      - chinju-network
    stdin_open: true
    tty: true
    command: bash

  # ==========================================================================
  # Full Integration Test (includes sidecar + TPM)
  # ==========================================================================
  chinju-integration-test:
    build:
      context: .
      dockerfile: chinju-sidecar/Dockerfile
      args:
        ENABLE_TPM: "true"
    container_name: chinju-integration-test
    environment:
      - RUST_LOG=debug,chinju_sidecar=trace
      - CHINJU_GRPC_PORT=50051
      - CHINJU_HTTP_PORT=8080
      - TPM_INTERFACE=socket
      - TPM_HOST=swtpm
      - TPM_PORT=2321
      - CHINJU_DMS_USE_TPM=true
    ports:
      - "50052:50051"  # Alternate port to avoid conflict
      - "8081:8080"
    depends_on:
      swtpm:
        condition: service_healthy
    networks:
      - chinju-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
