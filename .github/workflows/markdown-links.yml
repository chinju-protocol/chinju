name: Markdown Link Check

on:
  pull_request:
    paths:
      - "**/*.md"
      - ".github/workflows/markdown-links.yml"
      - ".github/markdown-link-check-config.json"
  push:
    branches:
      - main
    paths:
      - "**/*.md"
      - ".github/workflows/markdown-links.yml"
      - ".github/markdown-link-check-config.json"

jobs:
  english-doc-links:
    name: English docs local link check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check local links in English contribution path
        run: |
          set -euo pipefail

          files=(
            "README_EN.md"
            "CONTRIBUTING_EN.md"
            "CODE_OF_CONDUCT.md"
            ".github/PULL_REQUEST_TEMPLATE.md"
            ".github/ISSUE_TEMPLATE/bug_report.md"
            ".github/ISSUE_TEMPLATE/feature_request.md"
            "docs/NITRO_ENCLAVES.md"
            "docs/AUDIT_INTEGRITY.md"
          )

          for file in "${files[@]}"; do
            if [ -f "$file" ]; then
              echo "Checking $file"
              npx --yes markdown-link-check "$file" \
                --config .github/markdown-link-check-config.json
            fi
          done
