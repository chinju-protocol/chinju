// CHINJU Protocol - Credential Service API
// Version: 0.1.0

syntax = "proto3";
package chinju.api.credential;

option go_package = "github.com/chinju-protocol/chinju-go/gen/chinju/api/credential";
option java_package = "org.chinju.protocol.api.credential";
option java_multiple_files = true;

import "chinju/common.proto";
import "chinju/credential.proto";

// =============================================================================
// Credential Service
// =============================================================================

service CredentialService {
  // Request a new credential
  rpc RequestCredential(RequestCredentialRequest) returns (RequestCredentialResponse);

  // Submit humanity proof
  rpc SubmitProof(SubmitProofRequest) returns (SubmitProofResponse);

  // Get credential by ID
  rpc GetCredential(GetCredentialRequest) returns (GetCredentialResponse);

  // Verify a credential
  rpc VerifyCredential(VerifyCredentialRequest) returns (VerifyCredentialResponse);

  // Renew a credential
  rpc RenewCredential(RenewCredentialRequest) returns (RenewCredentialResponse);

  // Revoke a credential (IRREVERSIBLE)
  rpc RevokeCredential(RevokeCredentialRequest) returns (RevokeCredentialResponse);

  // Start capability test
  rpc StartCapabilityTest(StartCapabilityTestRequest) returns (stream CapabilityTestChallenge);

  // Submit test response
  rpc SubmitTestResponse(stream TestResponse) returns (TestResult);

  // Get revocation list
  rpc GetRevocationList(GetRevocationListRequest) returns (GetRevocationListResponse);

  // Watch credential state changes
  rpc WatchCredentialState(WatchCredentialStateRequest) returns (stream chinju.credential.CredentialStateTransition);
}

// =============================================================================
// Request/Response Messages
// =============================================================================

message RequestCredentialRequest {
  chinju.common.Identifier subject_id = 1;
  chinju.common.ValidityPeriod requested_validity = 2;
  chinju.common.Identifier preferred_issuer = 3;
}

enum NextStep {
  NEXT_STEP_UNSPECIFIED = 0;
  SUBMIT_PROOF = 1;
  START_TEST = 2;
  AWAIT_APPROVAL = 3;
}

message RequestCredentialResponse {
  string request_id = 1;
  NextStep next_step = 2;
  repeated chinju.credential.ProofType available_proof_types = 3;
  chinju.common.Timestamp expires_at = 4;
}

message SubmitProofRequest {
  string request_id = 1;
  chinju.credential.HumanityProof proof = 2;
}

message SubmitProofResponse {
  bool accepted = 1;
  string message = 2;
  chinju.credential.HumanCredential credential = 3;
  NextStep next_step = 4;
}

message GetCredentialRequest {
  chinju.common.Identifier credential_id = 1;
  bool include_chain = 2;
}

message GetCredentialResponse {
  chinju.credential.HumanCredential credential = 1;
  chinju.credential.CredentialState state = 2;
  chinju.credential.CertificationStatus certification = 3;
}

message VerifyCredentialRequest {
  chinju.credential.HumanCredential credential = 1;
  VerifyOptions options = 2;
}

message VerifyOptions {
  bool skip_revocation_check = 1;
  double min_capability_score = 2;
  uint64 min_chain_length = 3;
  bool require_hardware_attestation = 4;
}

message VerifyCredentialResponse {
  bool valid = 1;
  repeated VerifyError errors = 2;
  VerifyDetails details = 3;
}

message VerifyError {
  string code = 1;
  string message = 2;
  string field = 3;
}

message VerifyDetails {
  bool signature_valid = 1;
  bool not_expired = 2;
  bool not_revoked = 3;
  double capability_score = 4;
  uint64 chain_length = 5;
  chinju.common.TrustLevel trust_level = 6;
}

message RenewCredentialRequest {
  chinju.common.Identifier credential_id = 1;
  chinju.credential.HumanityProof new_proof = 2;
}

message RenewCredentialResponse {
  chinju.credential.HumanCredential renewed_credential = 1;
}

message RevokeCredentialRequest {
  chinju.common.Identifier credential_id = 1;
  string reason = 2;
  chinju.common.ThresholdSignature authorization = 3;
}

message RevokeCredentialResponse {
  bool success = 1;
  chinju.common.Timestamp revoked_at = 2;
  chinju.common.Hash hardware_proof = 3;
}

// =============================================================================
// Capability Test
// =============================================================================

enum TestType {
  TEST_TYPE_UNSPECIFIED = 0;
  INDEPENDENCE = 1;
  DETECTION = 2;
  ALTERNATIVES = 3;
  CRITIQUE = 4;
  COMPREHENSIVE = 5;
}

message StartCapabilityTestRequest {
  chinju.common.Identifier subject_id = 1;
  TestType test_type = 2;
  string test_version = 3;
}

enum ChallengeType {
  CHALLENGE_TYPE_UNSPECIFIED = 0;
  DECISION_MAKING = 1;
  ANOMALY_DETECTION = 2;
  ALTERNATIVE_GENERATION = 3;
  CRITICAL_ANALYSIS = 4;
}

message CapabilityTestChallenge {
  string challenge_id = 1;
  ChallengeType challenge_type = 2;
  bytes challenge_data = 3;
  uint32 time_limit_seconds = 4;
  int32 sequence_number = 5;
  int32 total_challenges = 6;
}

message TestResponse {
  string challenge_id = 1;
  bytes response_data = 2;
  uint32 response_time_ms = 3;
  chinju.common.Timestamp submitted_at = 4;
}

message TestResult {
  chinju.credential.CapabilityScore score = 1;
  bool passed = 2;
  string feedback = 3;
  chinju.credential.CertificationLevel achieved_level = 4;
}

// =============================================================================
// Revocation List
// =============================================================================

message GetRevocationListRequest {
  chinju.common.Timestamp since = 1;
  uint32 limit = 2;
  string page_token = 3;
}

message GetRevocationListResponse {
  repeated chinju.credential.RevokedCredential revoked = 1;
  chinju.common.Timestamp as_of = 2;
  string next_page_token = 3;
}

message WatchCredentialStateRequest {
  chinju.common.Identifier credential_id = 1;
}
