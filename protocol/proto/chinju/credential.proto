// CHINJU Protocol - Human Credential (C12)
// Version: 0.1.0

syntax = "proto3";
package chinju.credential;

option go_package = "github.com/chinju-protocol/chinju-go/gen/chinju/credential";
option java_package = "org.chinju.protocol.credential";
option java_multiple_files = true;

import "chinju/common.proto";

// =============================================================================
// Human Credential
// =============================================================================

// Human Credential - Proof that the holder is human with sufficient capability
message HumanCredential {
  // Subject identifier
  chinju.common.Identifier subject_id = 1;

  // Issuer identifier
  chinju.common.Identifier issuer_id = 2;

  // When issued
  chinju.common.Timestamp issued_at = 3;

  // Validity period
  chinju.common.ValidityPeriod validity = 4;

  // Proof of humanity (ZKP-based)
  HumanityProof humanity_proof = 5;

  // Capability score (C1: HCAL)
  CapabilityScore capability = 6;

  // Consciousness continuity chain
  ChainProof chain_proof = 7;

  // Issuer's signature
  chinju.common.Signature issuer_signature = 8;

  // Hardware attestation
  chinju.common.HardwareAttestation attestation = 9;

  // Credential version
  uint64 version = 10;
}

// =============================================================================
// Humanity Proof
// =============================================================================

// Type of humanity proof
enum ProofType {
  PROOF_TYPE_UNSPECIFIED = 0;
  // Biometric response (eye tracking, typing rhythm, etc.)
  BIOMETRIC_RESPONSE = 1;
  // Cognitive pattern analysis
  COGNITIVE_PATTERN = 2;
  // Composite (combination of above)
  COMPOSITE = 3;
}

// Zero-knowledge proof of humanity
message HumanityProof {
  ProofType proof_type = 1;

  // ZKP data (format depends on proof_type)
  bytes zkp_data = 2;

  // Public parameters for verification
  bytes public_params = 3;

  // Degradation score (proof of finiteness)
  DegradationScore degradation = 4;

  // When the proof was generated
  chinju.common.Timestamp generated_at = 5;
}

// Degradation score - proves human finiteness (AI doesn't degrade)
message DegradationScore {
  // Cumulative fatigue (0.0 - 1.0)
  double fatigue = 1;

  // Attention decay (0.0 - 1.0)
  double attention_decay = 2;

  // Response time variance (humans have variance, AI is consistent)
  double response_variance = 3;

  // When measured
  chinju.common.Timestamp measured_at = 4;

  // Whether within normal human range
  bool within_human_range = 5;
}

// =============================================================================
// Capability Score (C1: HCAL)
// =============================================================================

// Capability score for AI control authorization
message CapabilityScore {
  // Independence from AI suggestions (0.0 - 1.0)
  double independence = 1;

  // Anomaly detection ability (0.0 - 1.0)
  double detection = 2;

  // Alternative generation ability (0.0 - 1.0)
  double alternatives = 3;

  // Critical evaluation ability (0.0 - 1.0)
  double critique = 4;

  // Total weighted score (0.0 - 1.0)
  double total = 5;

  // Measurement context
  MeasurementContext context = 6;
}

// Context of capability measurement
message MeasurementContext {
  chinju.common.Timestamp measured_at = 1;

  // Environment identifier (TEE enclave ID, etc.)
  string environment_id = 2;

  // Hardware attestation of measurement environment
  chinju.common.HardwareAttestation attestation = 3;

  // Test version used
  string test_version = 4;
}

// =============================================================================
// Chain Proof (Consciousness Continuity)
// =============================================================================

// Proof of consciousness continuity
message ChainProof {
  // Hash of previous credential
  chinju.common.Hash previous_hash = 1;

  // Length of the chain
  uint64 chain_length = 2;

  // Recent chain links (for verification)
  repeated ChainLink recent_links = 3;
}

// Single link in the chain
message ChainLink {
  chinju.common.Hash credential_hash = 1;
  chinju.common.Timestamp issued_at = 2;
  chinju.common.Signature signature = 3;
}

// =============================================================================
// Credential State
// =============================================================================

// Credential lifecycle state
enum CredentialState {
  CREDENTIAL_STATE_UNSPECIFIED = 0;
  // Not yet issued
  INITIAL = 1;
  // Proving humanity (measurement in progress)
  PROVING = 2;
  // Verified and active
  VERIFIED = 3;
  // Expired (can be renewed)
  EXPIRED = 4;
  // Suspended (pending investigation)
  SUSPENDED = 5;
  // Revoked (IRREVERSIBLE - enforced by hardware)
  REVOKED = 6;
}

// State transition event
enum CredentialTransitionEvent {
  CREDENTIAL_TRANSITION_UNSPECIFIED = 0;
  ISSUE = 1;
  VERIFY_SUCCESS = 2;
  VERIFY_FAIL = 3;
  EXPIRE = 4;
  FAIL_TEST = 5;
  DETECT_AI = 6;
  RENEW = 7;
  RE_VERIFY = 8;
  APPEAL_SUCCESS = 9;
  APPEAL_TIMEOUT = 10;
  // IRREVERSIBLE
  REVOKE = 11;
}

// State transition record
message CredentialStateTransition {
  chinju.common.Identifier credential_id = 1;
  CredentialState from_state = 2;
  CredentialState to_state = 3;
  CredentialTransitionEvent event = 4;
  chinju.common.Timestamp timestamp = 5;
  string reason = 6;
  chinju.common.Signature authorizer = 7;
  bool is_irreversible = 8;
}

// =============================================================================
// Certification
// =============================================================================

// Certification level
enum CertificationLevel {
  CERTIFICATION_LEVEL_UNSPECIFIED = 0;
  // Basic: can use AI with supervision
  BASIC = 1;
  // Standard: can use AI independently
  STANDARD = 2;
  // Advanced: can supervise others
  ADVANCED = 3;
  // Expert: can modify policies
  EXPERT = 4;
}

// Certification status
message CertificationStatus {
  CredentialState state = 1;
  CertificationLevel level = 2;
  chinju.common.Timestamp expires_at = 3;
  repeated string conditions = 4;
}

// =============================================================================
// Revocation
// =============================================================================

// Revocation reason
enum RevocationReason {
  REVOCATION_REASON_UNSPECIFIED = 0;
  // Capability score below threshold
  REVOCATION_BELOW_THRESHOLD = 1;
  // AI behavior detected
  REVOCATION_AI_DETECTED = 2;
  // Security breach
  REVOCATION_SECURITY_BREACH = 3;
  // Manual revocation by authority
  REVOCATION_MANUAL = 4;
  // Appeal timeout
  REVOCATION_APPEAL_TIMEOUT = 5;
}

// Revoked credential record
message RevokedCredential {
  chinju.common.Identifier credential_id = 1;
  chinju.common.Timestamp revoked_at = 2;
  RevocationReason reason = 3;
  string details = 4;
  // Hash of eFuse burn proof
  chinju.common.Hash hardware_proof = 5;
}
