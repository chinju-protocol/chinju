name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install without vllm (GPU-only dependency)
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install numpy scipy grpcio grpcio-tools protobuf pydantic
          pip install pytest pytest-asyncio pytest-cov mypy ruff

      - name: Install package
        run: |
          # Install in editable mode, ignoring vllm dependency
          pip install -e . --no-deps
          pip install numpy scipy grpcio grpcio-tools protobuf pydantic

      - name: Run tests
        run: |
          pytest tests/ -v --cov=chinju_vllm --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linters
        run: |
          pip install ruff mypy

      - name: Run ruff
        run: |
          ruff check chinju_vllm/

      - name: Run ruff format check
        run: |
          ruff format --check chinju_vllm/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install numpy scipy grpcio grpcio-tools protobuf pydantic mypy

      - name: Run mypy
        run: |
          mypy chinju_vllm/ --ignore-missing-imports
